services:
  ml-train:
    build: .
    command: ["python", "entrypoints/training.py"]
    volumes:
      - ./data:/app/data
      - ./conf:/app/conf

  ml-inference:
    build: .
    command: ["python", "entrypoints/inference.py"]
    volumes:
      - ./data:/app/data
      - ./conf:/app/conf
    depends_on:
      ml-train:
        condition: service_started

  app-ui:
    build: .
    command: ["python", "entrypoints/app_ui.py"]
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
      - ./conf:/app/conf
    depends_on:
      - ml-inference
